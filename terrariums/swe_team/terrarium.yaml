# SWE Team Terrarium
# A software engineering team: implementer writes code, reviewer reviews.
#
# Topology:
#   root -> tasks -> swe
#   swe  ==========> reviewer        (every draft auto-delivered via output_wiring)
#   reviewer -> feedback -> swe      (conditional: approve vs. revise → channel)
#   reviewer -> results              (final approved output → channel)
#   every creature -> root           (lifecycle ping, with_content: false)
#   team_chat broadcast for coordination
#
# The swe -> reviewer pipeline edge uses output_wiring: every turn-end
# text from the implementer is automatically delivered to the reviewer
# as a `creature_output` event. The reviewer keeps channel-based output
# because its approve/revise decision is conditional.
#
# Design: creatures inherit the full swe toolset + subagents. Role is
# shaped by the per-creature prompt and wiring / channel topology, NOT
# by stripping tools. Users get their default model/auth — do not
# hard-code model, auth_mode, or service_tier here.

terrarium:
  name: swe_team

  root:
    base_config: "@kt-biome/creatures/general"
    system_prompt_file: prompts/root.md
    controller:
      reasoning_effort: high
      tool_format: native
    # The framework force-injects the terrarium_* / creature_* toolset on
    # any root agent regardless of this list; declaring them here makes
    # the tools appear in the auto-generated prompt tool listing.
    tools:
      - { name: terrarium_create, type: builtin }
      - { name: terrarium_status, type: builtin }
      - { name: terrarium_stop, type: builtin }
      - { name: terrarium_send, type: builtin }
      - { name: terrarium_observe, type: builtin }
      - { name: terrarium_history, type: builtin }
      - { name: creature_start, type: builtin }
      - { name: creature_stop, type: builtin }

  creatures:
    - name: swe
      base_config: "@kt-biome/creatures/swe"
      system_prompt_file: prompts/swe.md
      controller:
        reasoning_effort: xhigh
        tool_format: native
      # Every implementer turn-end → reviewer (wiring). Lifecycle → root.
      output_wiring:
        - reviewer
        - { to: root, with_content: false }
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [team_chat]

    - name: reviewer
      base_config: "@kt-biome/creatures/swe"
      system_prompt_file: prompts/reviewer.md
      controller:
        reasoning_effort: high
        tool_format: native
      # Reviewer is CONDITIONAL (approve vs. revise). Outbound goes on
      # channels. Only lifecycle pings root.
      output_wiring:
        - { to: root, with_content: false }
      channels:
        listen: [team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    tasks:     { type: queue,     description: "Incoming task assignments" }
    feedback:  { type: queue,     description: "Reviewer -> swe (revision requests)" }
    results:   { type: queue,     description: "Final approved results (from reviewer)" }
    team_chat: { type: broadcast, description: "Team coordination and status" }
