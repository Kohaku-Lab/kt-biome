# Auto-Research Terrarium
# Universal version of Karpathy's autoresearch pattern.
# Automatically runs experiments, evaluates results, and iterates.
#
# The ratchet loop:
#   ideator proposes hypothesis -> coder implements -> runner executes
#   -> analyzer evaluates -> feedback to ideator (keep or discard)
#
# Usage:
#   kt terrarium run @kohaku-creatures/terrariums/auto_research/
#
# The root agent receives the research goal from the user and kicks off
# the loop. Experiments run until stopped or a target metric is reached.
#
# Topology:
#   root -> goals -> ideator -> implementations -> coder -> experiments
#   -> runner -> results -> analyzer -> feedback -> ideator (loop)
#   analyzer -> log (append-only experiment journal)
#   writer listens on log, produces summaries on demand

terrarium:
  name: auto_research

  root:
    base_config: "@kohaku-creatures/creatures/root"
    controller:
      tool_format: native

  creatures:
    - name: ideator
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a research ideator. Your job is to propose experiment hypotheses.

        WORKFLOW:
        1. Read the research goal from the "goals" channel
        2. Read feedback from previous experiments (if any) from "feedback"
        3. Propose ONE concrete, testable hypothesis
        4. Describe the specific code change needed
        5. Send your proposal to "implementations"

        RULES:
        - Each proposal must be a single, atomic change
        - Always explain WHY you think this will improve the metric
        - Learn from failed experiments (read feedback carefully)
        - Be creative but grounded in the codebase
        - Never propose the same change twice
      tools:
        - { name: read, type: builtin }
        - { name: glob, type: builtin }
        - { name: grep, type: builtin }
        - { name: think, type: builtin }
        - { name: search_memory, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [goals, feedback]
        can_send: [implementations]

    - name: coder
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a research coder. You implement experiment proposals.

        WORKFLOW:
        1. Read a proposal from "implementations"
        2. Read the current codebase
        3. Make the proposed changes (edit tool)
        4. Verify the changes are syntactically correct
        5. Send "ready" to "experiments" with a description of what changed

        RULES:
        - Make ONLY the changes described in the proposal
        - Keep a backup: note what you changed so it can be reverted
        - If the proposal is unclear, implement your best interpretation
        - Test syntax with a dry run if possible
      tools:
        - { name: read, type: builtin }
        - { name: write, type: builtin }
        - { name: edit, type: builtin }
        - { name: glob, type: builtin }
        - { name: grep, type: builtin }
        - { name: bash, type: builtin }
        - { name: think, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [implementations]
        can_send: [experiments]

    - name: runner
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are an experiment runner. You execute experiments and collect results.

        WORKFLOW:
        1. Receive "ready" signal from "experiments"
        2. Run the experiment command (e.g., "python train.py", "uv run train.py")
        3. Capture stdout/stderr and the target metric
        4. Send the raw results to "results"

        RULES:
        - Enforce a time limit on experiments (use timeout in bash)
        - Always capture the metric value from output
        - Report both the metric and any errors/warnings
        - Do NOT interpret results, just report them faithfully
      tools:
        - { name: bash, type: builtin }
        - { name: read, type: builtin }
        - { name: think, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [experiments]
        can_send: [results]

    - name: analyzer
      base_config: "@kohaku-creatures/creatures/general"
      system_prompt: |
        You are a results analyzer. You evaluate experiment outcomes.

        WORKFLOW:
        1. Read results from "results"
        2. Compare the metric to the current baseline
        3. DECIDE: keep (metric improved) or discard (metric worsened/unchanged)
        4. If KEEP: update the baseline, send positive feedback
        5. If DISCARD: revert the changes (or instruct coder to revert)
        6. Send analysis to "feedback" for the ideator
        7. Log the experiment to "log"

        RULES:
        - Be strict: only keep changes that measurably improve the metric
        - Include the metric delta in your feedback
        - Track experiment count and cumulative improvement
        - Suggest directions for the ideator based on patterns you see
      tools:
        - { name: read, type: builtin }
        - { name: bash, type: builtin }
        - { name: edit, type: builtin }
        - { name: think, type: builtin }
        - { name: scratchpad, type: builtin }
        - { name: send_message, type: builtin }
        - { name: wait_channel, type: builtin }
      channels:
        listen: [results]
        can_send: [feedback, log]

  channels:
    goals:           { type: queue, description: "Research goals from user/root" }
    implementations: { type: queue, description: "Experiment proposals from ideator to coder" }
    experiments:     { type: queue, description: "Ready-to-run experiments from coder to runner" }
    results:         { type: queue, description: "Raw experiment results from runner to analyzer" }
    feedback:        { type: queue, description: "Analysis feedback from analyzer back to ideator" }
    log:             { type: broadcast, description: "Append-only experiment journal" }
